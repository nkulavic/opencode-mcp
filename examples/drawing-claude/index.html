<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing App</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-dark: #1e1e1e;
  --bg-panel: #2b2b2b;
  --bg-hover: #3a3a3a;
  --bg-active: #4a4a4a;
  --border: #444;
  --text: #ccc;
  --text-bright: #fff;
  --accent: #4a9eff;
  --toolbar-width: 220px;
  --layer-panel-width: 200px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg-dark);
  user-select: none;
  -webkit-user-select: none;
}

#app {
  display: flex;
  width: 100%; height: 100%;
}

#toolbar {
  width: var(--toolbar-width);
  min-width: var(--toolbar-width);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 10;
}

#canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: none;
  background-color: #888;
  background-image:
    linear-gradient(45deg, #666 25%, transparent 25%),
    linear-gradient(-45deg, #666 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #666 75%),
    linear-gradient(-45deg, transparent 75%, #666 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
}

#layer-panel {
  width: var(--layer-panel-width);
  min-width: var(--layer-panel-width);
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

#canvas-container {
  position: absolute;
  transform-origin: 0 0;
}

#canvas-container canvas {
  position: absolute;
  top: 0; left: 0;
  image-rendering: auto;
}

#preview-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 100;
}

#cursor-ring {
  position: fixed;
  border: 2px solid rgba(255,255,255,0.8);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: difference;
  display: none;
}

.toolbar-section {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.toolbar-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  margin-bottom: 8px;
  font-weight: 600;
}

.tool-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}

.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  aspect-ratio: 1;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  line-height: 1;
}

.tool-btn:hover { background: var(--bg-hover); }

.tool-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.tool-btn .tool-label {
  font-size: 9px;
  margin-top: 3px;
}

.color-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

#color-picker {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: none;
  padding: 0;
}

#color-picker::-webkit-color-swatch-wrapper { padding: 0; }
#color-picker::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 6px; }
#color-picker::-moz-color-swatch { border: 2px solid var(--border); border-radius: 6px; }

#current-color-display {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-radius: 6px;
}

.swatch-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
}

.swatch {
  width: 100%;
  aspect-ratio: 1;
  border: 2px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
}

.swatch:hover { transform: scale(1.15); border-color: #888; }

.swatch.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.slider-row label {
  width: 50px;
  font-size: 11px;
  color: #888;
  flex-shrink: 0;
}

.slider-row input[type="range"] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #555;
  border-radius: 2px;
  outline: none;
}

.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}

.slider-row input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  cursor: pointer;
}

.slider-row .slider-val {
  width: 36px;
  text-align: right;
  font-size: 11px;
  color: var(--text-bright);
  flex-shrink: 0;
}

.action-btn {
  display: block;
  width: 100%;
  padding: 8px;
  margin-bottom: 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-hover);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  transition: background 0.15s;
}

.action-btn:hover { background: var(--bg-active); color: var(--text-bright); }
.action-btn:last-child { margin-bottom: 0; }

#layer-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

#layer-panel-header h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  font-weight: 600;
}

#add-layer-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-hover);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

#add-layer-btn:hover { background: var(--bg-active); color: var(--text-bright); }

#layer-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

.layer-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px;
  margin-bottom: 4px;
  border: 1px solid transparent;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}

.layer-item:hover { background: var(--bg-hover); }

.layer-item.active {
  background: var(--bg-active);
  border-color: var(--accent);
}

.layer-thumb {
  width: 40px; height: 30px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background-color: #888;
  background-image:
    linear-gradient(45deg, #666 25%, transparent 25%),
    linear-gradient(-45deg, #666 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #666 75%),
    linear-gradient(-45deg, transparent 75%, #666 75%);
  background-size: 8px 8px;
  background-position: 0 0, 0 4px, 4px -4px, -4px 0;
  flex-shrink: 0;
}

.layer-name {
  flex: 1;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.layer-btn {
  width: 24px; height: 24px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.layer-btn:hover { background: var(--bg-hover); color: var(--text-bright); }
.layer-btn.hidden-layer { opacity: 0.35; }

#zoom-indicator {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
}

#zoom-indicator.visible { opacity: 1; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-panel); }
::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #777; }
</style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <div class="toolbar-section">
      <h3>Tools</h3>
      <div class="tool-grid" id="tool-grid"></div>
    </div>

    <div class="toolbar-section">
      <h3>Color</h3>
      <div class="color-row">
        <input type="color" id="color-picker" value="#000000">
        <div id="current-color-display" style="background:#000000;"></div>
      </div>
      <div class="swatch-grid" id="swatch-grid"></div>
    </div>

    <div class="toolbar-section">
      <h3>Brush</h3>
      <div class="slider-row">
        <label>Size</label>
        <input type="range" id="stroke-width" min="1" max="50" value="4">
        <span class="slider-val" id="stroke-width-val">4px</span>
      </div>
      <div class="slider-row">
        <label>Opacity</label>
        <input type="range" id="opacity-slider" min="0" max="100" value="100">
        <span class="slider-val" id="opacity-val">100%</span>
      </div>
    </div>

    <div class="toolbar-section">
      <h3>Actions</h3>
      <button class="action-btn" id="btn-undo"></button>
      <button class="action-btn" id="btn-redo"></button>
      <button class="action-btn" id="btn-clear"></button>
      <button class="action-btn" id="btn-save"></button>
    </div>

    <div class="toolbar-section">
      <h3>Zoom</h3>
      <div class="slider-row">
        <label>Zoom</label>
        <input type="range" id="zoom-slider" min="50" max="400" value="100" step="10">
        <span class="slider-val" id="zoom-val">100%</span>
      </div>
      <button class="action-btn" id="btn-zoom-fit">Fit to Window</button>
    </div>
  </div>

  <div id="canvas-area">
    <div id="canvas-container"></div>
    <canvas id="preview-canvas"></canvas>
    <div id="zoom-indicator">100%</div>
  </div>

  <div id="layer-panel">
    <div id="layer-panel-header">
      <h3>Layers</h3>
      <button id="add-layer-btn" title="Add Layer">+</button>
    </div>
    <div id="layer-list"></div>
  </div>
</div>

<div id="cursor-ring"></div>

<script>
(function() {
  "use strict";

  var CANVAS_W = 1200;
  var CANVAS_H = 800;
  var MAX_LAYERS = 5;
  var MAX_HISTORY = 50;
  var PRESET_COLORS = [
    "#000000","#ffffff","#e53935","#fb8c00","#fdd835","#43a047",
    "#00acc1","#1e88e5","#8e24aa","#ec407a","#795548","#9e9e9e"
  ];

  var TOOLS = [
    { id: "pen",     icon: "\u270E", label: "Pen",     key: "B" },
    { id: "line",    icon: "\u2571", label: "Line",    key: "L" },
    { id: "rect",    icon: "\u25A2", label: "Rect",    key: "R" },
    { id: "ellipse", icon: "\u25CB", label: "Ellipse", key: "E" },
    { id: "eraser",  icon: "\u2421", label: "Eraser",  key: "X" },
    { id: "fill",    icon: "\u2615", label: "Fill",    key: "G" }
  ];

  var currentTool = "pen";
  var currentColor = "#000000";
  var strokeWidth = 4;
  var globalOpacity = 1;
  var zoom = 1;
  var panX = 0, panY = 0;
  var isPanning = false;
  var panStartX = 0, panStartY = 0;
  var panStartPanX = 0, panStartPanY = 0;
  var spaceHeld = false;
  var isDrawing = false;
  var drawStartX = 0, drawStartY = 0;
  var lastX = 0, lastY = 0;

  var layers = [];
  var activeLayerIndex = 0;

  var canvasArea = document.getElementById("canvas-area");
  var canvasContainer = document.getElementById("canvas-container");
  var previewCanvas = document.getElementById("preview-canvas");
  var previewCtx = previewCanvas.getContext("2d");
  var cursorRing = document.getElementById("cursor-ring");
  var zoomIndicator = document.getElementById("zoom-indicator");
  var layerListEl = document.getElementById("layer-list");
  var colorPicker = document.getElementById("color-picker");
  var currentColorDisplay = document.getElementById("current-color-display");
  var strokeWidthSlider = document.getElementById("stroke-width");
  var strokeWidthVal = document.getElementById("stroke-width-val");
  var opacitySlider = document.getElementById("opacity-slider");
  var opacityVal = document.getElementById("opacity-val");
  var zoomSlider = document.getElementById("zoom-slider");
  var zoomVal = document.getElementById("zoom-val");

  function init() {
    canvasContainer.style.width = CANVAS_W + "px";
    canvasContainer.style.height = CANVAS_H + "px";
    previewCanvas.width = CANVAS_W;
    previewCanvas.height = CANVAS_H;
    previewCanvas.style.width = CANVAS_W + "px";
    previewCanvas.style.height = CANVAS_H + "px";

    buildToolGrid();
    buildSwatches();
    buildActionButtons();
    addLayer("Background", true);
    updateTransform();
    centerCanvas();
    bindEvents();
    renderLayerPanel();
  }

  /* ── Build UI elements with safe DOM methods ── */

  function buildToolGrid() {
    var grid = document.getElementById("tool-grid");
    for (var i = 0; i < TOOLS.length; i++) {
      var t = TOOLS[i];
      var btn = document.createElement("button");
      btn.className = "tool-btn" + (t.id === currentTool ? " active" : "");
      btn.dataset.tool = t.id;
      btn.title = t.label + " (" + t.key + ")";

      var iconSpan = document.createElement("span");
      iconSpan.textContent = t.icon;
      btn.appendChild(iconSpan);

      var labelSpan = document.createElement("span");
      labelSpan.className = "tool-label";
      labelSpan.textContent = t.label;
      btn.appendChild(labelSpan);

      grid.appendChild(btn);
    }
  }

  function buildActionButtons() {
    var btnUndo = document.getElementById("btn-undo");
    btnUndo.textContent = "\u21B6 Undo (Ctrl+Z)";

    var btnRedo = document.getElementById("btn-redo");
    btnRedo.textContent = "\u21B7 Redo (Ctrl+Shift+Z)";

    var btnClear = document.getElementById("btn-clear");
    btnClear.textContent = "\u2716 Clear Layer";

    var btnSave = document.getElementById("btn-save");
    btnSave.textContent = "\uD83D\uDCBE Save as PNG";
  }

  function buildSwatches() {
    var grid = document.getElementById("swatch-grid");
    for (var i = 0; i < PRESET_COLORS.length; i++) {
      var s = document.createElement("div");
      s.className = "swatch";
      s.style.background = PRESET_COLORS[i];
      s.dataset.color = PRESET_COLORS[i];
      if (PRESET_COLORS[i] === "#ffffff") {
        s.style.borderColor = "#888";
      }
      s.addEventListener("click", function(e) {
        setColor(e.currentTarget.dataset.color);
      });
      grid.appendChild(s);
    }
    updateSwatchHighlight();
  }

  /* ── Layers ── */

  function addLayer(name, fillWhite) {
    if (layers.length >= MAX_LAYERS) return;
    var c = document.createElement("canvas");
    c.width = CANVAS_W;
    c.height = CANVAS_H;
    c.style.width = CANVAS_W + "px";
    c.style.height = CANVAS_H + "px";
    var ctx = c.getContext("2d");
    if (fillWhite) {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
    var layer = {
      canvas: c,
      ctx: ctx,
      visible: true,
      name: name || ("Layer " + (layers.length + 1)),
      history: [],
      historyIndex: -1
    };
    layers.push(layer);
    activeLayerIndex = layers.length - 1;
    rebuildCanvasStack();
    saveHistory(layers.length - 1);
    renderLayerPanel();
  }

  function deleteLayer(idx) {
    if (layers.length <= 1) return;
    layers[idx].canvas.remove();
    layers.splice(idx, 1);
    if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
    rebuildCanvasStack();
    renderLayerPanel();
  }

  function rebuildCanvasStack() {
    var children = canvasContainer.querySelectorAll("canvas");
    for (var i = 0; i < children.length; i++) {
      children[i].remove();
    }
    for (var i = 0; i < layers.length; i++) {
      layers[i].canvas.style.zIndex = String(i);
      layers[i].canvas.style.display = layers[i].visible ? "block" : "none";
      canvasContainer.appendChild(layers[i].canvas);
    }
    canvasContainer.appendChild(previewCanvas);
  }

  function getActiveLayer() {
    return layers[activeLayerIndex];
  }

  /* ── History ── */

  function saveHistory(layerIdx) {
    if (layerIdx === undefined) layerIdx = activeLayerIndex;
    var layer = layers[layerIdx];
    if (!layer) return;
    layer.history = layer.history.slice(0, layer.historyIndex + 1);
    var imgData = layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);
    layer.history.push(imgData);
    if (layer.history.length > MAX_HISTORY) {
      layer.history.shift();
    }
    layer.historyIndex = layer.history.length - 1;
  }

  function undo() {
    var layer = getActiveLayer();
    if (layer.historyIndex > 0) {
      layer.historyIndex--;
      layer.ctx.putImageData(layer.history[layer.historyIndex], 0, 0);
      renderLayerPanel();
    }
  }

  function redo() {
    var layer = getActiveLayer();
    if (layer.historyIndex < layer.history.length - 1) {
      layer.historyIndex++;
      layer.ctx.putImageData(layer.history[layer.historyIndex], 0, 0);
      renderLayerPanel();
    }
  }

  /* ── Coordinates ── */

  function screenToCanvas(sx, sy) {
    var rect = canvasArea.getBoundingClientRect();
    return {
      x: (sx - rect.left - panX) / zoom,
      y: (sy - rect.top - panY) / zoom
    };
  }

  /* ── Zoom/Pan ── */

  function setZoom(z, pivotSX, pivotSY) {
    var oldZoom = zoom;
    zoom = Math.max(0.5, Math.min(4, z));
    if (pivotSX !== undefined && pivotSY !== undefined) {
      var rect = canvasArea.getBoundingClientRect();
      var lx = pivotSX - rect.left;
      var ly = pivotSY - rect.top;
      panX = lx - (lx - panX) * (zoom / oldZoom);
      panY = ly - (ly - panY) * (zoom / oldZoom);
    }
    updateTransform();
    zoomSlider.value = String(Math.round(zoom * 100));
    zoomVal.textContent = Math.round(zoom * 100) + "%";
    showZoomIndicator();
  }

  function updateTransform() {
    canvasContainer.style.transform = "translate(" + panX + "px," + panY + "px) scale(" + zoom + ")";
  }

  function centerCanvas() {
    var rect = canvasArea.getBoundingClientRect();
    panX = (rect.width - CANVAS_W * zoom) / 2;
    panY = (rect.height - CANVAS_H * zoom) / 2;
    updateTransform();
  }

  var zoomTimeout = null;
  function showZoomIndicator() {
    zoomIndicator.textContent = Math.round(zoom * 100) + "%";
    zoomIndicator.classList.add("visible");
    clearTimeout(zoomTimeout);
    zoomTimeout = setTimeout(function() {
      zoomIndicator.classList.remove("visible");
    }, 1000);
  }

  /* ── Drawing ── */

  function configureStroke(ctx) {
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = strokeWidth;
    if (currentTool === "eraser") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(0,0,0,1)";
      ctx.fillStyle = "rgba(0,0,0,1)";
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = globalOpacity;
      ctx.strokeStyle = currentColor;
      ctx.fillStyle = currentColor;
    }
  }

  function drawPenSegment(ctx, x0, y0, x1, y1) {
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  }

  function drawPenDot(ctx, x, y) {
    ctx.beginPath();
    ctx.arc(x, y, strokeWidth / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function clearPreview() {
    previewCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  }

  function drawShapePreview(x, y) {
    clearPreview();
    previewCtx.save();
    previewCtx.lineCap = "round";
    previewCtx.lineJoin = "round";
    previewCtx.lineWidth = strokeWidth;
    previewCtx.globalAlpha = globalOpacity;
    previewCtx.strokeStyle = currentColor;

    if (currentTool === "line") {
      previewCtx.beginPath();
      previewCtx.moveTo(drawStartX, drawStartY);
      previewCtx.lineTo(x, y);
      previewCtx.stroke();
    } else if (currentTool === "rect") {
      var rx = Math.min(drawStartX, x);
      var ry = Math.min(drawStartY, y);
      var rw = Math.abs(x - drawStartX);
      var rh = Math.abs(y - drawStartY);
      previewCtx.strokeRect(rx, ry, rw, rh);
    } else if (currentTool === "ellipse") {
      var cx = (drawStartX + x) / 2;
      var cy = (drawStartY + y) / 2;
      var erx = Math.abs(x - drawStartX) / 2;
      var ery = Math.abs(y - drawStartY) / 2;
      previewCtx.beginPath();
      previewCtx.ellipse(cx, cy, Math.max(erx, 0.01), Math.max(ery, 0.01), 0, 0, Math.PI * 2);
      previewCtx.stroke();
    }

    previewCtx.restore();
  }

  function commitShape(x, y) {
    var layer = getActiveLayer();
    var ctx = layer.ctx;
    ctx.save();
    configureStroke(ctx);

    if (currentTool === "line") {
      ctx.beginPath();
      ctx.moveTo(drawStartX, drawStartY);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else if (currentTool === "rect") {
      var rx = Math.min(drawStartX, x);
      var ry = Math.min(drawStartY, y);
      var rw = Math.abs(x - drawStartX);
      var rh = Math.abs(y - drawStartY);
      ctx.strokeRect(rx, ry, rw, rh);
    } else if (currentTool === "ellipse") {
      var cx = (drawStartX + x) / 2;
      var cy = (drawStartY + y) / 2;
      var erx = Math.abs(x - drawStartX) / 2;
      var ery = Math.abs(y - drawStartY) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, Math.max(erx, 0.01), Math.max(ery, 0.01), 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
    clearPreview();
  }

  /* ── Flood Fill ── */

  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16)
    };
  }

  function floodFill(ctx, startX, startY, fillHex) {
    var sx = Math.round(startX);
    var sy = Math.round(startY);
    if (sx < 0 || sy < 0 || sx >= CANVAS_W || sy >= CANVAS_H) return;

    var imageData = ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);
    var data = imageData.data;
    var w = CANVAS_W;
    var h = CANVAS_H;

    var fc = hexToRgb(fillHex);
    var fillR = fc.r, fillG = fc.g, fillB = fc.b;
    var fillA = Math.round(globalOpacity * 255);

    var startIdx = (sy * w + sx) * 4;
    var targetR = data[startIdx];
    var targetG = data[startIdx + 1];
    var targetB = data[startIdx + 2];
    var targetA = data[startIdx + 3];

    if (targetR === fillR && targetG === fillG && targetB === fillB && targetA === fillA) return;

    var tol = 30;

    function matches(i) {
      return Math.abs(data[i] - targetR) <= tol &&
             Math.abs(data[i + 1] - targetG) <= tol &&
             Math.abs(data[i + 2] - targetB) <= tol &&
             Math.abs(data[i + 3] - targetA) <= tol;
    }

    function setPixel(i) {
      data[i] = fillR;
      data[i + 1] = fillG;
      data[i + 2] = fillB;
      data[i + 3] = fillA;
    }

    var stack = [];
    stack.push(sx, sy);
    var visited = new Uint8Array(w * h);

    while (stack.length > 0) {
      var cy = stack.pop();
      var cx = stack.pop();
      var vi = cy * w + cx;

      if (visited[vi]) continue;
      if (!matches(vi * 4)) continue;

      var lx = cx;
      while (lx > 0 && matches(((cy * w) + lx - 1) * 4) && !visited[cy * w + lx - 1]) {
        lx--;
      }

      var x = lx;
      var spanAbove = false;
      var spanBelow = false;

      while (x < w) {
        var pi = (cy * w + x) * 4;
        if (!matches(pi) || visited[cy * w + x]) break;

        visited[cy * w + x] = 1;
        setPixel(pi);

        if (cy > 0) {
          var ai = ((cy - 1) * w + x) * 4;
          var aboveVi = (cy - 1) * w + x;
          if (matches(ai) && !visited[aboveVi]) {
            if (!spanAbove) {
              stack.push(x, cy - 1);
              spanAbove = true;
            }
          } else {
            spanAbove = false;
          }
        }

        if (cy < h - 1) {
          var bi = ((cy + 1) * w + x) * 4;
          var belowVi = (cy + 1) * w + x;
          if (matches(bi) && !visited[belowVi]) {
            if (!spanBelow) {
              stack.push(x, cy + 1);
              spanBelow = true;
            }
          } else {
            spanBelow = false;
          }
        }

        x++;
      }
    }

    ctx.putImageData(imageData, 0, 0);
  }

  /* ── Export ── */

  function saveAsPNG() {
    var exportCanvas = document.createElement("canvas");
    exportCanvas.width = CANVAS_W;
    exportCanvas.height = CANVAS_H;
    var exportCtx = exportCanvas.getContext("2d");
    for (var i = 0; i < layers.length; i++) {
      if (layers[i].visible) {
        exportCtx.drawImage(layers[i].canvas, 0, 0);
      }
    }
    var link = document.createElement("a");
    link.download = "drawing.png";
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
  }

  function clearActiveLayer() {
    var layer = getActiveLayer();
    layer.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    saveHistory();
    renderLayerPanel();
  }

  /* ── Color ── */

  function setColor(c) {
    currentColor = c;
    colorPicker.value = c;
    currentColorDisplay.style.background = c;
    updateSwatchHighlight();
  }

  function updateSwatchHighlight() {
    var swatches = document.querySelectorAll(".swatch");
    for (var i = 0; i < swatches.length; i++) {
      swatches[i].classList.toggle("active", swatches[i].dataset.color === currentColor);
    }
  }

  /* ── Layer Panel ── */

  function renderLayerPanel() {
    while (layerListEl.firstChild) {
      layerListEl.removeChild(layerListEl.firstChild);
    }
    for (var i = layers.length - 1; i >= 0; i--) {
      (function(idx) {
        var layer = layers[idx];
        var item = document.createElement("div");
        item.className = "layer-item" + (idx === activeLayerIndex ? " active" : "");

        var thumb = document.createElement("canvas");
        thumb.className = "layer-thumb";
        thumb.width = 40;
        thumb.height = 30;
        var tctx = thumb.getContext("2d");
        tctx.drawImage(layer.canvas, 0, 0, CANVAS_W, CANVAS_H, 0, 0, 40, 30);

        var nameSpan = document.createElement("span");
        nameSpan.className = "layer-name";
        nameSpan.textContent = layer.name;

        var visBtn = document.createElement("button");
        visBtn.className = "layer-btn" + (layer.visible ? "" : " hidden-layer");
        visBtn.textContent = "\uD83D\uDC41";
        visBtn.title = layer.visible ? "Hide layer" : "Show layer";
        visBtn.addEventListener("click", function(e) {
          e.stopPropagation();
          layer.visible = !layer.visible;
          layer.canvas.style.display = layer.visible ? "block" : "none";
          renderLayerPanel();
        });

        var delBtn = document.createElement("button");
        delBtn.className = "layer-btn";
        delBtn.textContent = "\uD83D\uDDD1";
        delBtn.title = "Delete layer";
        delBtn.addEventListener("click", function(e) {
          e.stopPropagation();
          deleteLayer(idx);
        });

        item.appendChild(thumb);
        item.appendChild(nameSpan);
        item.appendChild(visBtn);
        item.appendChild(delBtn);

        item.addEventListener("click", function() {
          activeLayerIndex = idx;
          renderLayerPanel();
        });

        layerListEl.appendChild(item);
      })(i);
    }
  }

  /* ── Cursor ── */

  function updateCursor(e) {
    if (currentTool === "fill") {
      canvasArea.style.cursor = "crosshair";
      cursorRing.style.display = "none";
      return;
    }
    if (spaceHeld || isPanning) {
      cursorRing.style.display = "none";
      return;
    }
    canvasArea.style.cursor = "none";
    cursorRing.style.display = "block";
    var size = strokeWidth * zoom;
    var displaySize = Math.max(size, 4);
    cursorRing.style.width = displaySize + "px";
    cursorRing.style.height = displaySize + "px";
    cursorRing.style.left = (e.clientX - displaySize / 2) + "px";
    cursorRing.style.top = (e.clientY - displaySize / 2) + "px";
    cursorRing.style.borderColor = currentTool === "eraser"
      ? "rgba(255,100,100,0.8)"
      : "rgba(255,255,255,0.8)";
  }

  /* ── Tool Selection ── */

  function selectTool(tool) {
    currentTool = tool;
    var btns = document.querySelectorAll(".tool-btn");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("active", btns[i].dataset.tool === tool);
    }
  }

  /* ── Events ── */

  function bindEvents() {
    var toolBtns = document.querySelectorAll(".tool-btn");
    for (var i = 0; i < toolBtns.length; i++) {
      toolBtns[i].addEventListener("click", function(e) {
        selectTool(e.currentTarget.dataset.tool);
      });
    }

    colorPicker.addEventListener("input", function() {
      setColor(colorPicker.value);
    });

    strokeWidthSlider.addEventListener("input", function() {
      strokeWidth = parseInt(strokeWidthSlider.value);
      strokeWidthVal.textContent = strokeWidth + "px";
    });

    opacitySlider.addEventListener("input", function() {
      globalOpacity = parseInt(opacitySlider.value) / 100;
      opacityVal.textContent = opacitySlider.value + "%";
    });

    zoomSlider.addEventListener("input", function() {
      var rect = canvasArea.getBoundingClientRect();
      setZoom(parseInt(zoomSlider.value) / 100, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    document.getElementById("btn-undo").addEventListener("click", undo);
    document.getElementById("btn-redo").addEventListener("click", redo);
    document.getElementById("btn-clear").addEventListener("click", clearActiveLayer);
    document.getElementById("btn-save").addEventListener("click", saveAsPNG);
    document.getElementById("add-layer-btn").addEventListener("click", function() { addLayer(); });
    document.getElementById("btn-zoom-fit").addEventListener("click", function() {
      zoom = 1;
      centerCanvas();
      zoomSlider.value = "100";
      zoomVal.textContent = "100%";
      showZoomIndicator();
    });

    canvasArea.addEventListener("mousedown", onMouseDown);
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);

    canvasArea.addEventListener("touchstart", onTouchStart, { passive: false });
    canvasArea.addEventListener("touchmove", onTouchMove, { passive: false });
    canvasArea.addEventListener("touchend", onTouchEnd, { passive: false });

    canvasArea.addEventListener("wheel", function(e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? -0.1 : 0.1;
      setZoom(zoom + delta, e.clientX, e.clientY);
    }, { passive: false });

    window.addEventListener("keydown", function(e) {
      if (e.code === "Space" && !spaceHeld && !e.repeat) {
        e.preventDefault();
        spaceHeld = true;
        canvasArea.style.cursor = "grab";
        cursorRing.style.display = "none";
      }
      if ((e.ctrlKey || e.metaKey) && e.code === "KeyZ") {
        e.preventDefault();
        if (e.shiftKey) { redo(); } else { undo(); }
      }
      if (!e.ctrlKey && !e.metaKey && !e.altKey) {
        switch (e.code) {
          case "KeyB": selectTool("pen"); break;
          case "KeyL": selectTool("line"); break;
          case "KeyR": selectTool("rect"); break;
          case "KeyE": selectTool("ellipse"); break;
          case "KeyX": selectTool("eraser"); break;
          case "KeyG": selectTool("fill"); break;
        }
      }
    });

    window.addEventListener("keyup", function(e) {
      if (e.code === "Space") {
        spaceHeld = false;
        if (!isPanning) {
          canvasArea.style.cursor = currentTool === "fill" ? "crosshair" : "none";
        }
      }
    });

    canvasArea.addEventListener("mouseleave", function() {
      cursorRing.style.display = "none";
    });

    canvasArea.addEventListener("mouseenter", function(e) {
      if (!spaceHeld && !isPanning && currentTool !== "fill") {
        cursorRing.style.display = "block";
      }
    });

    // Prevent context menu on canvas
    canvasArea.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
  }

  /* ── Mouse Handlers ── */

  function onMouseDown(e) {
    if (e.button === 1) {
      e.preventDefault();
      startPan(e.clientX, e.clientY);
      canvasArea.style.cursor = "grabbing";
      return;
    }

    if (spaceHeld && e.button === 0) {
      startPan(e.clientX, e.clientY);
      canvasArea.style.cursor = "grabbing";
      return;
    }

    if (e.button !== 0) return;

    var pos = screenToCanvas(e.clientX, e.clientY);
    var layer = getActiveLayer();
    if (!layer.visible) return;

    isDrawing = true;
    drawStartX = pos.x;
    drawStartY = pos.y;
    lastX = pos.x;
    lastY = pos.y;

    if (currentTool === "pen" || currentTool === "eraser") {
      configureStroke(layer.ctx);
      drawPenDot(layer.ctx, pos.x, pos.y);
    } else if (currentTool === "fill") {
      floodFill(layer.ctx, pos.x, pos.y, currentColor);
      saveHistory();
      renderLayerPanel();
      isDrawing = false;
    }

    updateCursor(e);
  }

  function onMouseMove(e) {
    if (!isPanning) {
      updateCursor(e);
    }

    if (isPanning) {
      panX = panStartPanX + (e.clientX - panStartX);
      panY = panStartPanY + (e.clientY - panStartY);
      updateTransform();
      return;
    }

    if (!isDrawing) return;

    var pos = screenToCanvas(e.clientX, e.clientY);
    var layer = getActiveLayer();

    if (currentTool === "pen" || currentTool === "eraser") {
      configureStroke(layer.ctx);
      drawPenSegment(layer.ctx, lastX, lastY, pos.x, pos.y);
      lastX = pos.x;
      lastY = pos.y;
    } else if (currentTool === "line" || currentTool === "rect" || currentTool === "ellipse") {
      drawShapePreview(pos.x, pos.y);
      lastX = pos.x;
      lastY = pos.y;
    }
  }

  function onMouseUp(e) {
    if (isPanning) {
      isPanning = false;
      canvasArea.style.cursor = spaceHeld ? "grab" : (currentTool === "fill" ? "crosshair" : "none");
      return;
    }

    if (!isDrawing) return;
    isDrawing = false;

    var pos = screenToCanvas(e.clientX, e.clientY);

    if (currentTool === "line" || currentTool === "rect" || currentTool === "ellipse") {
      commitShape(pos.x, pos.y);
    }

    var layer = getActiveLayer();
    layer.ctx.globalCompositeOperation = "source-over";
    layer.ctx.globalAlpha = 1;

    saveHistory();
    renderLayerPanel();
  }

  function startPan(sx, sy) {
    isPanning = true;
    panStartX = sx;
    panStartY = sy;
    panStartPanX = panX;
    panStartPanY = panY;
    cursorRing.style.display = "none";
  }

  /* ── Touch Handlers ── */

  var touchPanDist = 0;

  function onTouchStart(e) {
    e.preventDefault();
    if (e.touches.length === 2) {
      isDrawing = false;
      var mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      touchPanDist = Math.sqrt(dx * dx + dy * dy);
      startPan(mx, my);
      return;
    }
    if (e.touches.length === 1) {
      var t = e.touches[0];
      var pos = screenToCanvas(t.clientX, t.clientY);
      var layer = getActiveLayer();
      if (!layer.visible) return;

      isDrawing = true;
      drawStartX = pos.x;
      drawStartY = pos.y;
      lastX = pos.x;
      lastY = pos.y;

      if (currentTool === "pen" || currentTool === "eraser") {
        configureStroke(layer.ctx);
        drawPenDot(layer.ctx, pos.x, pos.y);
      } else if (currentTool === "fill") {
        floodFill(layer.ctx, pos.x, pos.y, currentColor);
        saveHistory();
        renderLayerPanel();
        isDrawing = false;
      }
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    if (isPanning && e.touches.length === 2) {
      var mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX = panStartPanX + (mx - panStartX);
      panY = panStartPanY + (my - panStartY);

      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (touchPanDist > 0) {
        var scale = dist / touchPanDist;
        setZoom(zoom * scale, mx, my);
        touchPanDist = dist;
      }

      updateTransform();
      return;
    }

    if (!isDrawing || e.touches.length !== 1) return;

    var t = e.touches[0];
    var pos = screenToCanvas(t.clientX, t.clientY);
    var layer = getActiveLayer();

    if (currentTool === "pen" || currentTool === "eraser") {
      configureStroke(layer.ctx);
      drawPenSegment(layer.ctx, lastX, lastY, pos.x, pos.y);
      lastX = pos.x;
      lastY = pos.y;
    } else if (currentTool === "line" || currentTool === "rect" || currentTool === "ellipse") {
      drawShapePreview(pos.x, pos.y);
      lastX = pos.x;
      lastY = pos.y;
    }
  }

  function onTouchEnd(e) {
    e.preventDefault();
    if (isPanning && e.touches.length < 2) {
      isPanning = false;
      return;
    }
    if (!isDrawing) return;
    isDrawing = false;

    if (currentTool === "line" || currentTool === "rect" || currentTool === "ellipse") {
      commitShape(lastX, lastY);
    }

    var layer = getActiveLayer();
    layer.ctx.globalCompositeOperation = "source-over";
    layer.ctx.globalAlpha = 1;

    saveHistory();
    renderLayerPanel();
  }

  init();

})();
</script>
</body>
</html>
