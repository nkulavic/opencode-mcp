<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
 
      :root {
        --bg-color: #f5f7fa;
        --card-bg: #ffffff;
        --column-bg: #eef2f7;
        --column-header-bg: #e8eef5;
        --column-header-hover: #dce4f0;
        --modal-bg: #ffffff;
        --shadow: 0 2px 8px rgba(0,0,0,0.1);
        --shadow-hover: 0 4px 12px rgba(0,0,0,0.15);
        --primary: #4a90d9;
        --primary-hover: #3a7bc8;
        --text: #2c3e50;
        --text-light: #7f8c8d;
        --danger: #e74c3c;
        --warning: #f39c12;
        --red-label: #e74c3c;
        --yellow-label: #f39c12;
        --green-label: #2ecc71;
        --blue-label: #3498db;
      }
 
      body {
        background: var(--bg-color);
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
        transition: background 0.3s, color 0.3s;
      }
 
      body.dark {
        --bg-color: #1a202c;
        --card-bg: #2d3748;
        --column-bg: #2d3748;
        --column-header-bg: #4a5568;
        --column-header-hover: #5a667c;
        --modal-bg: #2d3748;
        --text: #e2e8f0;
        --text-light: #cbd5e0;
      }
 
      .theme-toggle {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text);
        transition: color 0.3s;
      }
 
      .theme-toggle:hover {
        opacity: 0.8;
      }


    body {
      background: var(--bg-color);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      max-width: 100%;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .search-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 250px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .add-column-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .add-column-btn:hover {
      background: var(--primary-hover);
    }

    .board {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 20px;
    }

    .column {
      min-width: 300px;
      flex: 0 0 auto;
      background: var(--column-bg);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 140px);
      transition: background 0.3s;
    }

    .column-header {
          padding: 12px 16px;
          background: var(--column-header-bg);
          border-radius: 8px 8px 0 0;
          font-weight: 600;
          display: flex;
          justify-content: space-between;
          align-items: center;
          cursor: pointer;
          transition: background 0.3s;
        }

    .column-header:hover {
      background: var(--column-header-hover);
    }

    .column-header .column-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .column-header .delete-column {
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 18px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }

    .column-header:hover .delete-column {
      opacity: 1;
    }

    .column-header .delete-column:hover {
      color: var(--danger);
    }

    .column.cards-header {
      font-size: 12px;
      color: var(--text-light);
      padding: 8px 16px;
    }

    .column-cards {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 50px;
    }

    .column-footer {
      padding: 8px 16px 12px;
    }

    .add-card-btn {
      width: 100%;
      padding: 6px;
      background: transparent;
      border: 1px dashed #ccc;
      border-radius: 6px;
      color: var(--text-light);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .add-card-btn:hover {
      background: #e0e6ed;
      border-color: var(--primary);
      color: var(--primary);
    }

    .card {
          background: var(--card-bg);
          border-radius: 6px;
          padding: 12px;
          margin-bottom: 8px;
          box-shadow: var(--shadow);
          cursor: grab;
          transition: box-shadow 0.2s, background 0.3s;
          position: relative;
          border-left: 4px solid transparent;
        }

    .card:hover {
      box-shadow: var(--shadow-hover);
    }

    .card.red-label { border-left-color: var(--red-label); }
    .card.yellow-label { border-left-color: var(--yellow-label); }
    .card.green-label { border-left-color: var(--green-label); }
    .card.blue-label { border-left-color: var(--blue-label); }

    .card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .card-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      color: var(--text);
    }

    .card-description {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 500;
      text-transform: none;
    }

    .badge.overdue {
      background: #fee;
      color: var(--danger);
    }

    .badge.due-today {
      background: #fef5e7;
      color: var(--warning);
    }

    .drop-indicator {
      height: 2px;
      background: var(--primary);
      margin: 4px 0;
      border-radius: 1px;
      opacity: 0.8;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

      .modal-content {
          background: var(--modal-bg);
          padding: 24px;
          border-radius: 8px;
          width: 90%;
          max-width: 500px;
          max-height: 90vh;
          overflow-y: auto;
          color: var(--text);
        }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-light);
      line-height: 1;
      padding: 4px;
    }

    .close-btn:hover {
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input[type="text"],
    .form-group textarea,
    .form-group input[type="date"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .color-options {
      display: flex;
      gap: 12px;
    }

    .color-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .color-option input[type="radio"] {
      margin: 0;
    }

    .color-preview {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      border: 2px solid transparent;
    }

    .color-option input[type="radio"]:checked + .color-preview {
      border-color: var(--text);
    }

    .color-preview.red { background: var(--red-label); }
    .color-preview.yellow { background: var(--yellow-label); }
    .color-preview.green { background: var(--green-label); }
    .color-preview.blue { background: var(--blue-label); }
    .color-preview.none { background: transparent; border: 2px solid #ddd; }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e0e6ed;
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #d0d7de;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 767px) {
      .board {
        flex-direction: column;
        overflow-x: visible;
      }

      .column {
        min-width: 100%;
        max-height: none;
      }

      .column-cards {
        max-height: 400px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .search-input {
        width: 100%;
      }

      .search-container {
        flex-direction: column;
        width: 100%;
      }

      .add-column-btn {
        width: 100%;
      }

      .modal-content {
        width: 95%;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>Kanban Board</h1>
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search cards..." id="searchInput">
        <button class="add-column-btn" id="addColumnBtn">+ Add Column</button>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌞</button>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div class="modal" id="cardModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="cardModalTitle">New Card</h2>
        <button class="close-btn" id="closeCardModal">&times;</button>
      </div>
      <form id="cardForm">
        <input type="hidden" id="cardId">
        <input type="hidden" id="cardColumnId">
        <div class="form-group">
          <label for="cardTitle">Title *</label>
          <input type="text" id="cardTitle" required>
        </div>
        <div class="form-group">
          <label for="cardDescription">Description</label>
          <textarea id="cardDescription"></textarea>
        </div>
        <div class="form-group">
          <label for="cardDueDate">Due Date</label>
          <input type="date" id="cardDueDate">
        </div>
        <div class="form-group">
          <label>Color Label</label>
          <div class="color-options">
            <label class="color-option">
              <input type="radio" name="cardColor" value="red" id="colorRed">
              <div class="color-preview red"></div>
            </label>
            <label class="color-option">
              <input type="radio" name="cardColor" value="yellow" id="colorYellow">
              <div class="color-preview yellow"></div>
            </label>
            <label class="color-option">
              <input type="radio" name="cardColor" value="green" id="colorGreen">
              <div class="color-preview green"></div>
            </label>
            <label class="color-option">
              <input type="radio" name="cardColor" value="blue" id="colorBlue">
              <div class="color-preview blue"></div>
            </label>
            <label class="color-option">
              <input type="radio" name="cardColor" value="none" id="colorNone" checked>
              <div class="color-preview none"></div>
            </label>
          </div>
        </div>
        <div class="modal-buttons">
          <button type="submit" class="btn btn-primary" id="saveCardBtn">Save Card</button>
          <button type="button" class="btn btn-danger hidden" id="deleteCardBtn">Delete</button>
          <button type="button" class="btn btn-secondary" id="cancelCardBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="columnModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="columnModalTitle">Add Column</h2>
        <button class="close-btn" id="closeColumnModal">&times;</button>
      </div>
      <form id="columnForm">
        <input type="hidden" id="columnId">
        <div class="form-group">
          <label for="columnName">Column Name *</label>
          <input type="text" id="columnName" required>
        </div>
        <div class="modal-buttons">
          <button type="submit" class="btn btn-primary" id="saveColumnBtn">Save Column</button>
          <button type="button" class="btn btn-secondary" id="cancelColumnBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'kanban-data';

    let state = {
      columns: [],
      cards: []
    };

    let draggedCard = null;
    let draggedCardId = null;

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        state = JSON.parse(saved);
      } else {
        state = {
          columns: [
            { id: 'col-1', name: 'To Do', order: 0 },
            { id: 'col-2', name: 'In Progress', order: 1 },
            { id: 'col-3', name: 'Done', order: 2 }
          ],
          cards: []
        };
        saveState();
      }
    }

    function getFilteredCards() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      if (!query) return state.cards;
      return state.cards.filter(card => 
        card.title.toLowerCase().includes(query) ||
        card.description.toLowerCase().includes(query)
      );
    }

    function getDueDateBadge(dueDate) {
      if (!dueDate) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dueDate);
      due.setHours(0, 0, 0, 0);
      
      if (due < today) {
        return '<span class="badge overdue">Overdue</span>';
      } else if (due.getTime() === today.getTime()) {
        return '<span class="badge due-today">Due today</span>';
      }
      return '';
    }

    function truncateText(text, maxLength) {
      if (!text) return '';
      return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
    }

    function renderBoard() {
      const board = document.getElementById('board');
      const filteredCards = getFilteredCards();
      
      board.innerHTML = '';
      
      const sortedColumns = [...state.columns].sort((a, b) => a.order - b.order);
      
      sortedColumns.forEach(column => {
        const columnCards = filteredCards
          .filter(card => card.columnId === column.id)
          .sort((a, b) => a.order - b.order);
        
        const columnEl = document.createElement('div');
        columnEl.className = 'column';
        columnEl.dataset.columnId = column.id;
        
        const cardCount = state.cards.filter(c => c.columnId === column.id).length;
        
        columnEl.innerHTML = `
          <div class="column-header" id="header-${column.id}">
            <span class="column-title">${escapeHtml(column.name)}</span>
            <button class="delete-column" data-column-id="${column.id}" title="Delete column">&times;</button>
          </div>
          <div class="column cards-header">${cardCount} ${cardCount === 1 ? 'card' : 'cards'}</div>
          <div class="column-cards" id="cards-${column.id}"></div>
          <div class="column-footer">
            <button class="add-card-btn" data-column-id="${column.id}">+ Add Card</button>
          </div>
        `;
        
        const cardsContainer = columnEl.querySelector(`#cards-${column.id}`);
        
        columnCards.forEach(card => {
          const cardEl = createCardElement(card);
          cardsContainer.appendChild(cardEl);
        });
        
        setupColumnDragEvents(cardsContainer, column.id);
        
        board.appendChild(columnEl);
      });
      
      setupEventListeners();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function createCardElement(card) {
      const cardEl = document.createElement('div');
      cardEl.className = `card ${card.color ? card.color + '-label' : ''}`;
      cardEl.dataset.cardId = card.id;
      cardEl.draggable = true;
      
      const dueDateBadge = getDueDateBadge(card.dueDate);
      
      cardEl.innerHTML = `
        <div class="card-title">${escapeHtml(card.title)}</div>
        <div class="card-description">${escapeHtml(truncateText(card.description, 100))}</div>
        <div class="card-footer">
          <div class="badges">${dueDateBadge}</div>
        </div>
      `;
      
      cardEl.addEventListener('click', () => openCardModal(card));
      cardEl.addEventListener('dragstart', handleDragStart);
      cardEl.addEventListener('dragend', handleDragEnd);
      
      return cardEl;
    }

    function setupColumnDragEvents(container, columnId) {
      container.addEventListener('dragover', handleDragOver);
      container.addEventListener('dragleave', handleDragLeave);
      container.addEventListener('drop', handleDrop);
    }

    function handleDragStart(e) {
      draggedCard = e.target;
      draggedCardId = e.target.dataset.cardId;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedCardId);
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      draggedCard = null;
      draggedCardId = null;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      
      const container = e.currentTarget;
      const afterElement = getDragAfterElement(container, e.clientY);
      
      document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      
      if (afterElement) {
        container.insertBefore(indicator, afterElement);
      } else {
        container.appendChild(indicator);
      }
    }

    function handleDragLeave(e) {
      const container = e.currentTarget;
      if (e.target === container) {
        container.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      
      const container = e.currentTarget;
      const columnId = container.parentElement.dataset.columnId;
      
      document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      
      if (!draggedCardId) return;
      
      const card = state.cards.find(c => c.id === draggedCardId);
      if (!card) return;
      
      const afterElement = getDragAfterElement(container, e.clientY);
      
      let newOrder = 0;
      const columnCards = state.cards
        .filter(c => c.columnId === columnId)
        .sort((a, b) => a.order - b.order);
      
      if (afterElement) {
        const afterCardId = afterElement.dataset.cardId;
        const afterCard = columnCards.find(c => c.id === afterCardId);
        if (afterCard) {
          newOrder = afterCard.order + 1;
        }
      } else if (columnCards.length > 0) {
        newOrder = Math.max(...columnCards.map(c => c.order)) + 1;
      }
      
      card.columnId = columnId;
      card.order = newOrder;
      
      reorderCards(columnId);
      
      saveState();
      renderBoard();
    }

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.card:not(.dragging)')];
      
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function reorderCards(columnId) {
      const columnCards = state.cards.filter(c => c.columnId === columnId);
      columnCards.sort((a, b) => a.order - b.order);
      
      columnCards.forEach((card, index) => {
        card.order = index;
      });
    }

    function openCardModal(card = null) {
      const modal = document.getElementById('cardModal');
      const title = document.getElementById('cardModalTitle');
      const form = document.getElementById('cardForm');
      const deleteBtn = document.getElementById('deleteCardBtn');
      
      form.reset();
      document.getElementById('colorNone').checked = true;
      
      if (card) {
        title.textContent = 'Edit Card';
        document.getElementById('cardId').value = card.id;
        document.getElementById('cardColumnId').value = card.columnId;
        document.getElementById('cardTitle').value = card.title;
        document.getElementById('cardDescription').value = card.description;
        document.getElementById('cardDueDate').value = card.dueDate || '';
        
        if (card.color) {
          const colorRadio = document.getElementById(`color${card.color.charAt(0).toUpperCase() + card.color.slice(1)}`);
          if (colorRadio) {
            colorRadio.checked = true;
          }
        }
        
        deleteBtn.classList.remove('hidden');
      } else {
        title.textContent = 'New Card';
        document.getElementById('cardId').value = '';
        document.getElementById('cardColumnId').value = '';
        deleteBtn.classList.add('hidden');
      }
      
      modal.classList.add('active');
    }

    function openColumnModal(columnId = null) {
      const modal = document.getElementById('columnModal');
      const title = document.getElementById('columnModalTitle');
      const form = document.getElementById('columnForm');
      
      form.reset();
      
      if (columnId) {
        const column = state.columns.find(c => c.id === columnId);
        if (column) {
          title.textContent = 'Edit Column';
          document.getElementById('columnId').value = column.id;
          document.getElementById('columnName').value = column.name;
        }
      } else {
        title.textContent = 'Add Column';
        document.getElementById('columnId').value = '';
      }
      
      modal.classList.add('active');
    }

    function closeModals() {
      document.getElementById('cardModal').classList.remove('active');
      document.getElementById('columnModal').classList.remove('active');
    }

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', renderBoard);
      
      document.getElementById('addColumnBtn').addEventListener('click', () => openColumnModal());
      
      document.querySelectorAll('.column-header').forEach(header => {
        header.addEventListener('dblclick', (e) => {
          if (e.target.classList.contains('delete-column')) return;
          const columnId = header.querySelector('.column-title').parentNode.dataset.columnId;
          openColumnModal(columnId);
        });
      });
      
      document.querySelectorAll('.delete-column').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const columnId = btn.dataset.columnId;
          const columnCards = state.cards.filter(c => c.columnId === columnId);
          if (columnCards.length > 0) {
            alert('Cannot delete column with cards. Please move or delete all cards first.');
            return;
          }
          if (confirm('Delete this column?')) {
            state.columns = state.columns.filter(c => c.id !== columnId);
            saveState();
            renderBoard();
          }
        });
      });
      
      document.querySelectorAll('.add-card-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const columnId = btn.dataset.columnId;
          openCardModal(null);
          document.getElementById('cardColumnId').value = columnId;
        });
      });
      
      document.getElementById('closeCardModal').addEventListener('click', closeModals);
      document.getElementById('closeColumnModal').addEventListener('click', closeModals);
      document.getElementById('cancelCardBtn').addEventListener('click', closeModals);
      document.getElementById('cancelColumnBtn').addEventListener('click', closeModals);
      
      document.getElementById('cardForm').addEventListener('submit', handleCardSave);
      document.getElementById('columnForm').addEventListener('submit', handleColumnSave);
      
      document.getElementById('deleteCardBtn').addEventListener('click', handleCardDelete);
    }

    function handleCardSave(e) {
      e.preventDefault();
      
      const cardId = document.getElementById('cardId').value;
      const columnId = document.getElementById('cardColumnId').value || state.columns[0]?.id;
      const title = document.getElementById('cardTitle').value.trim();
      const description = document.getElementById('cardDescription').value.trim();
      const dueDate = document.getElementById('cardDueDate').value;
      const color = document.querySelector('input[name="cardColor"]:checked').value;
      
      if (!title) {
        alert('Title is required');
        return;
      }
      
      if (cardId) {
        const card = state.cards.find(c => c.id === cardId);
        if (card) {
          card.title = title;
          card.description = description;
          card.dueDate = dueDate;
          card.color = color;
        }
      } else {
        if (!columnId || !state.columns.find(c => c.id === columnId)) {
          alert('Cannot add card. No valid column.');
          return;
        }
        
        const columnCards = state.cards.filter(c => c.columnId === columnId);
        const maxOrder = columnCards.length > 0 ? Math.max(...columnCards.map(c => c.order)) : -1;
        
        const newCard = {
          id: generateId(),
          columnId: columnId,
          title: title,
          description: description,
          dueDate: dueDate,
          color: color,
          order: maxOrder + 1
        };
        
        state.cards.push(newCard);
      }
      
      saveState();
      closeModals();
      renderBoard();
    }

    function handleCardDelete() {
      const cardId = document.getElementById('cardId').value;
      if (!cardId) return;
      
      if (confirm('Delete this card?')) {
        state.cards = state.cards.filter(c => c.id !== cardId);
        saveState();
        closeModals();
        renderBoard();
      }
    }

    function handleColumnSave(e) {
      e.preventDefault();
      
      const columnId = document.getElementById('columnId').value;
      const name = document.getElementById('columnName').value.trim();
      
      if (!name) {
        alert('Column name is required');
        return;
      }
      
      if (columnId) {
        const column = state.columns.find(c => c.id === columnId);
        if (column) {
          column.name = name;
        }
      } else {
        const maxOrder = state.columns.length > 0 ? Math.max(...state.columns.map(c => c.order)) : -1;
        const newColumn = {
          id: generateId(),
          name: name,
          order: maxOrder + 1
        };
        state.columns.push(newColumn);
      }
      
      saveState();
      closeModals();
      renderBoard();
    }

    // Theme handling
    const THEME_KEY = 'kanban-theme';
    const themeToggleBtn = document.getElementById('themeToggle');
    
    function applyTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      // Update toggle icon
      themeToggleBtn.textContent = theme === 'dark' ? '🌜' : '🌞';
    }
    
    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      applyTheme(theme);
    }
    
    themeToggleBtn.addEventListener('click', () => {
      const isDark = document.body.classList.contains('dark');
      const newTheme = isDark ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem(THEME_KEY, newTheme);
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModals();
      }
      if (e.key === 'n' || e.key === 'N') {
        const activeElement = document.activeElement;
        const isInputFocused = activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA';
        const isModalOpen = document.getElementById('cardModal').classList.contains('active') || 
                          document.getElementById('columnModal').classList.contains('active');
        
        if (!isInputFocused && !isModalOpen && state.columns.length > 0) {
          e.preventDefault();
          openCardModal(null);
          document.getElementById('cardColumnId').value = state.columns[0].id;
        }
      }
    });

    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeModals();
        }
      });
    });

    initTheme();
    loadState();
    renderBoard();
  </script>
</body>
</html>
